    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is expected value (EV) betting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Expected value betting means finding bets where the true probability of an outcome is higher than what the bookmaker's odds imply. Over time, +EV bets produce profit even if individual bets lose."
          }
        },
        {
          "@type": "Question",
          "name": "How does CalcoBet find value bets?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CalcoBet compares odds across multiple bookmakers to calculate a de-vigged true probability using consensus averaging. Any bet where the best available odds exceed that true probability is a +EV edge."
          }
        },
        {
          "@type": "Question",
          "name": "Is the free daily pick really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. One +EV pick per day, every day, completely free. No account required. It locks in for 24 hours so everyone sees the same pick."
          }
        }
      ]
    }
    </script>
