<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060D1A"/>
      <stop offset="60%" style="stop-color:#0B1628"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#gold)"/>

  <!-- Logo mark — sigma tile -->
  <rect x="80" y="72" width="64" height="64" rx="14" fill="url(#gold)"/>
  <text x="112" y="116" font-family="Georgia, serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">Σ</text>

  <!-- Brand name -->
  <text x="162" y="98" font-family="system-ui, sans-serif" font-size="38" font-weight="900" fill="white" letter-spacing="-1">Calco<tspan fill="#F59E0B">Bet</tspan></text>
  <text x="163" y="122" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.35)" letter-spacing="3">PROFITABLE BETTING</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Bet with the odds</text>
  <text x="80" y="326" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="url(#gold)" letter-spacing="-2">in your favour.</text>

  <!-- Sub copy -->
  <text x="80" y="398" font-family="system-ui, sans-serif" font-size="26" fill="rgba(255,255,255,0.5)">Free daily +EV pick · Pro edge ledger · Betting calculators</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="80" y="460" width="220" height="110" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="192" y="510" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="#10B981" text-anchor="middle" filter="url(#glow)">64.8%</text>
  <text x="192" y="540" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">MODEL ACCURACY</text>

  <!-- Stat 2 -->
  <rect x="320" y="460" width="220" height="110" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="432" y="510" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="#F59E0B" text-anchor="middle">+14.2%</text>
  <text x="432" y="540" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">AVG MONTHLY YIELD</text>

  <!-- Stat 3 -->
  <rect x="560" y="460" width="220" height="110" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="672" y="510" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">340+</text>
  <text x="672" y="540" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">ACTIVE SUBSCRIBERS</text>

  <!-- Right side: chart mockup -->
  <rect x="860" y="160" width="260" height="200" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="880" y="192" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.3)" letter-spacing="2">BANKROLL GROWTH</text>
  <text x="880" y="228" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="white">$1,000 → $7,200</text>
  <!-- Chart line -->
  <polyline points="880,310 900,305 920,295 950,290 980,275 1010,260 1040,240 1070,230 1100,210" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1100" cy="210" r="5" fill="#10B981"/>

  <!-- CTA pill -->
  <rect x="860" y="400" width="260" height="56" rx="16" fill="url(#gold)"/>
  <text x="990" y="434" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">Get Free Daily Pick →</text>

  <!-- Domain -->
  <text x="990" y="590" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">calcobet.com</text>
</svg>
