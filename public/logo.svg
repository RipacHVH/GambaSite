<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 68" fill="none">
  <defs>
    <!-- Icon gradient: blue → cyan → green along the signal line -->
    <linearGradient id="sig" x1="4" y1="48" x2="58" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1D4ED8"/>
      <stop offset="45%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- AI badge gradient: gold → amber -->
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!--
    ICON: AI signal pulse
    A flat monitoring baseline that fires one sharp upward spike
    (the moment the AI detects a +EV edge), then returns to baseline.
    Reads like an EKG / radar ping — active intelligence, not passive chart.
  -->

  <!-- Baseline glow (very subtle) -->
  <line x1="4" y1="48" x2="58" y2="48"
    stroke="url(#sig)" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- The signal path: flat → dip → SPIKE UP → descent → flat -->
  <polyline
    points="4,48 16,48 20,56 24,48 30,8 36,28 40,48 58,48"
    stroke="url(#sig)" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- Arrowhead at the spike tip pointing up -->
  <polyline
    points="22,17 30,8 38,17"
    stroke="url(#sig)" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Spike tip glow dot -->
  <circle cx="30" cy="8" r="3.5" fill="#10B981" opacity="0.9"/>
  <circle cx="30" cy="8" r="6"   fill="#10B981" opacity="0.15"/>

  <!-- Start dot -->
  <circle cx="4" cy="48" r="2" fill="#1D4ED8" opacity="0.6"/>

  <!-- Wordmark: CalcoBet -->
  <text
    x="74" y="41"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="28"
    letter-spacing="-0.5"
    fill="white">CalcoBet</text>

  <!-- AI badge -->
  <rect x="228" y="24" width="30" height="20" rx="5" ry="5" fill="url(#badge)"/>
  <text
    x="243" y="38"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="11"
    letter-spacing="0.5"
    fill="white"
    text-anchor="middle">AI</text>

  <!-- Tagline -->
  <text
    x="75" y="57"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="500"
    font-size="9"
    letter-spacing="3.2"
    fill="rgba(255,255,255,0.42)">PROFITABLE BETTING</text>
</svg>
