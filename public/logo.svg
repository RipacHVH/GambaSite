  <!-- AI badge -->
  <rect x="154" y="10" width="30" height="20" rx="5" fill="url(#badge)"/>
  <text
    x="169" y="24"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="11"
