<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 68" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="4" y1="64" x2="60" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="4" y1="64" x2="60" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Icon: hexagonal network frame -->
  <g transform="translate(2, 2)">
    <!-- Outer hex -->
    <polygon points="32,1 57,15 57,44 32,58 7,44 7,15"
      stroke="url(#iconGrad)" stroke-width="1.1" stroke-opacity="0.35" fill="url(#glowGrad)"/>

    <!-- Internal spokes -->
    <line x1="32" y1="1"  x2="32" y2="58" stroke="url(#iconGrad)" stroke-width="0.7" stroke-opacity="0.2"/>
    <line x1="7"  y1="15" x2="57" y2="44" stroke="url(#iconGrad)" stroke-width="0.7" stroke-opacity="0.2"/>
    <line x1="57" y1="15" x2="7"  y2="44" stroke="url(#iconGrad)" stroke-width="0.7" stroke-opacity="0.2"/>

    <!-- Trend line — the hero -->
    <polyline
      points="11,47 22,34 33,40 47,17"
      stroke="url(#iconGrad)" stroke-width="2.4"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrowhead -->
    <polyline
      points="39,12 47,17 43,25"
      stroke="url(#iconGrad)" stroke-width="2.4"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nodes on trend -->
    <circle cx="11" cy="47" r="2.8" fill="url(#iconGrad)"/>
    <circle cx="22" cy="34" r="2.2" fill="url(#iconGrad)"/>
    <circle cx="33" cy="40" r="2.2" fill="url(#iconGrad)"/>
    <circle cx="47" cy="17" r="3.2" fill="url(#iconGrad)"/>

    <!-- Subtle outer glow dots at hex vertices -->
    <circle cx="32" cy="1"  r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="57" cy="15" r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="57" cy="44" r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="32" cy="58" r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="7"  cy="44" r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="7"  cy="15" r="1.4" fill="url(#iconGrad)" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text
    x="76" y="41"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="29"
    letter-spacing="-0.6"
    fill="white">CalcoBet</text>

  <!-- Tagline -->
  <text
    x="77" y="57"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="500"
    font-size="10"
    letter-spacing="3.8"
    fill="rgba(255,255,255,0.5)">EDGE INTELLIGENCE</text>
</svg>
