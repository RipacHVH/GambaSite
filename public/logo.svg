<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 68" fill="none">
  <defs>
    <!-- Circle border: deep blue → cyan -->
    <linearGradient id="cg" x1="4" y1="61" x2="58" y2="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <!-- Circle subtle bg -->
    <radialGradient id="rbg" cx="55%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#1E40AF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0.03"/>
    </radialGradient>
    <!-- Bars: dark teal bottom → bright green top -->
    <linearGradient id="bg" x1="0" y1="62" x2="0" y2="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <!-- Bar highlight (left edge shine) -->
    <linearGradient id="bh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6EE7B7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </linearGradient>
    <!-- Arrow: blue → cyan → near-white -->
    <linearGradient id="ag" x1="5" y1="56" x2="55" y2="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="55%"  stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <!-- Arrow shadow -->
    <linearGradient id="as" x1="5" y1="56" x2="55" y2="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E3A8A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Clip path — inside circle only for bars -->
    <clipPath id="cc">
      <circle cx="31" cy="34" r="26.5"/>
    </clipPath>
  </defs>

  <!-- ── CIRCLE ───────────────────────────────── -->
  <circle cx="31" cy="34" r="27" fill="url(#rbg)"/>
  <!-- Circle stroke drawn LAST so it sits on top of everything -->

  <!-- ── BARS (solid filled, clipped inside circle) ──── -->
  <g clip-path="url(#cc)">
    <!-- Bar 1 — short -->
    <rect x="11.5" y="42" width="10" height="20" rx="2.5" fill="url(#bg)"/>
    <rect x="11.5" y="42" width="3"  height="20" rx="2.5" fill="url(#bh)"/>
    <!-- Bar 2 — medium -->
    <rect x="23.5" y="31" width="10" height="31" rx="2.5" fill="url(#bg)"/>
    <rect x="23.5" y="31" width="3"  height="31" rx="2.5" fill="url(#bh)"/>
    <!-- Bar 3 — tall -->
    <rect x="35.5" y="19" width="10" height="43" rx="2.5" fill="url(#bg)"/>
    <rect x="35.5" y="19" width="3"  height="43" rx="2.5" fill="url(#bh)"/>
  </g>

  <!--
    ── ARROW (solid filled polygon) ────────────────────
    Straight diagonal ribbon from bottom-left → top-right tip.

    Arrow axis: from (8, 56) → tip (54, 8)
    Direction vector (46, -48) → unit (0.692, -0.722)
    Perpendicular unit (0.722,  0.692)

    Body half-width = 4.5 px
    Transition point (70%): (8 + 32.2, 56 - 33.6) = (40.2, 22.4)

    Body corners:
      Lower-left  = start  − perp*4.5 = (8  − 3.25, 56 − 3.11) = ( 4.8, 52.9)
      Lower-right = start  + perp*4.5 = (8  + 3.25, 56 + 3.11) = (11.3, 59.1)
      Upper-right = trans  + perp*4.5 = (40 + 3.25, 22 + 3.11) = (43.3, 25.1)
      Upper-left  = trans  − perp*4.5 = (40 − 3.25, 22 − 3.11) = (36.8, 18.9)

    Arrowhead half-width = 9.5 px
      Right wing = trans + perp*9.5 = (40 + 6.86, 22 + 6.57) = (46.9, 28.6)
      Left wing  = trans − perp*9.5 = (40 − 6.86, 22 − 6.57) = (33.1, 15.4)
      Tip                             = (54, 8)
  -->

  <!-- Shadow: same shape, offset +2/+3, darker -->
  <path d="M 6.8,55.9 L 13.3,62.1 L 45.3,28.1 L 48.9,31.6 L 56,11 L 35.1,18.4 L 38.8,21.9 Z"
    fill="url(#as)"/>

  <!-- Main arrow (solid filled polygon) -->
  <path d="M 4.8,52.9 L 11.3,59.1 L 43.3,25.1 L 46.9,28.6 L 54,8 L 33.1,15.4 L 36.8,18.9 Z"
    fill="url(#ag)"/>

  <!-- Arrow highlight — thin brighter strip along the upper-left edge -->
  <path d="M 4.8,52.9 L 8,56 L 33.1,15.4 L 36.8,18.9 Z"
    fill="white" opacity="0.18"/>

  <!-- Start dot -->
  <circle cx="8" cy="56" r="3.2"  fill="#93C5FD"/>
  <circle cx="8" cy="56" r="6"    fill="#3B82F6" opacity="0.18"/>

  <!-- Circle border ON TOP (frames everything) -->
  <circle cx="31" cy="34" r="27" stroke="url(#cg)" stroke-width="2.5"/>

  <!-- ── WORDMARK ──────────────────────────────────── -->
  <text
    x="74" y="41"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="800" font-size="28" letter-spacing="-0.5"
    fill="white">CalcoBet</text>

  <!-- AI badge -->
  <rect x="228" y="24" width="30" height="20" rx="5" fill="#F59E0B"/>
  <text
    x="243" y="38"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="900" font-size="11" letter-spacing="0.5"
    fill="white" text-anchor="middle">AI</text>

  <!-- Tagline -->
  <text
    x="75" y="57"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="9" letter-spacing="3.2"
    fill="rgba(255,255,255,0.42)">PROFITABLE BETTING</text>
</svg>
