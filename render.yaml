services:
  - type: web
    name: edgefinder-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8787
      - key: ODDS_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
